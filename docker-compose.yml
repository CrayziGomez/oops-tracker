version: "3.8"

services:
  app:
    build: .
    container_name: oops-tracker
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - DATABASE_URL=file:./dev.db
      - NEXTAUTH_SECRET=secret_placeholder
      - NEXTAUTH_URL=http://localhost:3000
    volumes:
      - oops_data:/app/prisma
      - oops_uploads:/app/public/uploads

volumes:
  oops_data:
  oops_uploads:
